<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="description" content="View your habit analytics, success rate, and progress charts." />
  <title>Habit Tracker — Analytics</title>
  <link rel="stylesheet" href="css/styles.css?v=2" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
</head>
<body>
  <div class="app-container" id="app">

    <!-- ===== Header ===== -->
    <header class="header">
      <p class="header-date">Performance Dashboard</p>
      <h1 class="header-greeting">Analytics 📊</h1>
      <p class="header-subtitle">Your habit performance</p>
    </header>

    <!-- ===== Stat Cards ===== -->
    <h2 class="section-title">Overview</h2>
    <div class="stats-grid" id="statsGrid">
      <div class="stat-card fade-in">
        <div class="stat-icon">📋</div>
        <div class="stat-value" id="statTotal">0</div>
        <div class="stat-label">Total Habits</div>
      </div>
      <div class="stat-card fade-in">
        <div class="stat-icon">✅</div>
        <div class="stat-value" id="statDone">0</div>
        <div class="stat-label">Done Today</div>
      </div>
      <div class="stat-card fade-in">
        <div class="stat-icon">🎯</div>
        <div class="stat-value" id="statRate">0%</div>
        <div class="stat-label">Success Rate</div>
      </div>
      <div class="stat-card fade-in">
        <div class="stat-icon">🔥</div>
        <div class="stat-value" id="statStreak">0</div>
        <div class="stat-label">Best Streak</div>
      </div>
    </div>

    <!-- ===== Weekly Chart ===== -->
    <div class="chart-card fade-in">
      <h3>Weekly Progress</h3>
      <canvas id="weeklyChart"></canvas>
    </div>

    <!-- ===== 30 Day Chart ===== -->
    <div class="chart-card fade-in">
      <h3>Last 30 Days</h3>
      <canvas id="monthlyChart"></canvas>
    </div>

    <!-- ===== Bottom Navigation ===== -->
    <nav class="bottom-nav">
      <a href="index.html" class="nav-item" id="navHome">
        <span class="nav-icon">🏠</span> Home
      </a>
      <a href="analytics.html" class="nav-item active" id="navAnalytics">
        <span class="nav-icon">📊</span> Analytics
      </a>
      <a href="calendar.html" class="nav-item" id="navCalendar">
        <span class="nav-icon">📅</span> Calendar
      </a>
      <a href="settings.html" class="nav-item" id="navSettings">
        <span class="nav-icon">⚙️</span> Settings
      </a>
    </nav>
  </div>

  <script src="js/storage.js?v=2"></script>
  <script src="js/auth.js?v=2"></script>
  <script src="js/analytics.js?v=2"></script>
</body>
</html>
